<article class="card">
  {% if page.cover %}
    <div class="card-cover-wrapper">
      <a href="{{page.get_absolute_url}}" class="card-cover-link">
        <img 
          class="card-cover"
          loading="lazy"
          src="{{page.cover.url}}" 
          alt="{{page.title }}"
        >
      </a>
    </div>
  {% else %}
    <div class="card-cover-wrapper">
      <a href="{{page.get_absolute_url}}" class="card-cover-link">
        <img 
          class="card-cover"
          loading="lazy"
          src="https://picsum.photos/745/419/?rand=2" 
          alt="{{page.title }}"
        >
      </a>
    </div>
  {% endif %}

  <div class="card-text-wrapper">
    <div class="card-title-wrapper">
      <h2 class="card-title">
        <a href="{{page.get_absolute_url}}" class="card-title-link">
          {{page.title}}
        </a>
      </h2>
    </div>

    <div class="card-content-wrapper">
      <p class="card-content">
        {{page.excerpt}} 
      </p>

      <div class="card-actions">
        <a class="card-action-link" href="{{page.get_absolute_url}}">
          <span>Read</span>
          <i class="fa-solid fa-circle-arrow-right"></i>
        </a>
      </div>
    </div>
  </div>

</article>
